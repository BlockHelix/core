version: 1
applications:
  - appRoot: app
    framework: nextjs
    frontend:
      phases:
        preBuild:
          commands:
            - npm ci --legacy-peer-deps
        build:
          commands:
            # Amplify injects console env vars at build time only; bridge the server-side
            # ones into .env.production so the Next.js SSR runtime can read them.
            - env | grep -E '^(CLERK_SECRET_KEY|CLERK_WEBHOOK_SIGNING_SECRET|VAULT_API_KEY|VAULT_API_URL|RESEND_API_KEY|RESEND_AUDIENCE_ID|BASE_RPC_URL|RPC_PROXY_URL|NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY|NEXT_PUBLIC_BASE_RPC_URL)=' >> .env.production
            - npm run build
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
          - .next/cache/**/*
